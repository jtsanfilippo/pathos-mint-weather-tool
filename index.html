
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PATHOS — Weather Data Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  overflow-x: hidden;
  background: #000;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  background-attachment: local;
}
body {
  overflow-x: hidden;
  max-width: 100%;
  font-family: 'Onest', sans-serif;
}

body {
  background: #000;
  color: #fff;
  min-height: 100vh;
  position: relative;
}

/* Dot grid via pseudo on body — contained, no overflow */
/* dot grid moved to wrap::before */

/* Force Onest everywhere including form elements */
*, input, button, select, textarea {
  font-family: 'Onest', sans-serif;
}

:root {
  --pink: #ff007f;
  --yellow: #ffc100;
  --surface: #0d0d0d;
  --surface2: #161616;
  --border: #222;
  --border-light: #2e2e2e;
  --muted: #666;
  --dim: #444;
  --partly: #5977ff;
  --overcast: #99a3a8;
  --rainy: #e22d5b;
  /* kept for JS references */
  --showers: #5977ff;
  --text-muted: #666;
}

.wrap {
  max-width: 1080px;
  width: 100%;
  margin: 0 auto;
  padding: 48px 24px 96px;
  position: relative;
  z-index: 1;
}

/* dot grid on html — cannot overflow */

/* HEADER */
header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 64px;
  padding-bottom: 40px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  max-width: 100%;
  min-width: 0;
}

.logo-block {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.pathos-logo {
  height: 20px;
  width: auto;
  display: block;
  object-fit: contain;
  object-position: left center;
}

.tool-name {
  font-size: clamp(28px, 4.5vw, 52px);
  font-weight: 200;
  letter-spacing: -0.02em;
  line-height: 0.95;
}

.tool-name strong {
  display: block;
  font-weight: 800;
  color: var(--pink);
}

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-light);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--pink);
  box-shadow: 0 0 6px var(--pink);
  animation: pulse 2.4s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.header-sub {
  font-size: 10px;
  font-weight: 400;
  color: var(--dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* SECTION LABEL */
.sec-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 32px;
  margin-bottom: 24px;
  position: relative;
  max-width: 100%;
  min-width: 0;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--pink);
  border-radius: 4px 4px 0 0;
}

/* CHIPS */
.chips {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--border-light);
  border-radius: 2px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
  user-select: none;
}
.chip:hover { border-color: var(--pink); color: #fff; }
.chip.active { border-color: var(--pink); color: #fff; background: rgba(255,0,127,0.06); }
.chip .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--pink); opacity: 0; transition: opacity 0.18s; flex-shrink: 0; }
.chip.active .dot { opacity: 1; }

/* DATES */
.date-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 28px;
}
.field { display: flex; flex-direction: column; gap: 8px; }

label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

input[type="date"] {
  background: var(--surface2);
  border: 1px solid var(--border-light);
  border-radius: 2px;
  padding: 14px 16px;
  color: #fff;
  font-size: 13px;
  font-weight: 400;
  outline: none;
  transition: border-color 0.18s;
  width: 100%;
  color-scheme: dark;
}
input[type="date"]:focus { border-color: var(--pink); }

/* RUN BUTTON */
.run-btn {
  width: 100%;
  padding: 18px;
  background: var(--pink);
  color: #fff;
  border: none;
  border-radius: 2px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.run-btn:hover { background: #ff3399; }
.run-btn:active { transform: scale(0.995); }
.run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* PROGRESS */
.progress-bar { width: 100%; height: 1px; background: var(--border); margin-top: 20px; overflow: hidden; display: none; }
.progress-bar.visible { display: block; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--yellow)); width: 0%; transition: width 0.4s ease; }
.progress-text { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 10px; display: none; }
.progress-text.visible { display: block; }

/* ERROR */
.error-box { background: rgba(226,45,91,0.08); border: 1px solid rgba(226,45,91,0.3); border-radius: 2px; padding: 14px 18px; font-size: 12px; font-weight: 500; color: #e22d5b; margin-top: 16px; display: none; }
.error-box.visible { display: block; }

/* RESULTS */
.results-section { display: none; max-width: 100%; min-width: 0; }
.results-section.visible { display: block; max-width: 100%; }

.results-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

.results-title {
  font-size: 26px;
  font-weight: 300;
  letter-spacing: -0.01em;
}
.results-title span { color: var(--pink); font-weight: 800; }
.results-meta { font-size: 10px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

.dl-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 22px;
  background: transparent;
  border: 1px solid var(--border-light);
  color: var(--muted);
  border-radius: 2px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.dl-btn:hover { border-color: var(--yellow); color: var(--yellow); }

/* STATS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  margin-bottom: 32px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.stat-card { background: var(--surface); padding: 24px 20px; }
.stat-num { font-size: 40px; font-weight: 200; line-height: 1; margin-bottom: 6px; letter-spacing: -0.02em; }
.stat-unit { font-size: 20px; font-weight: 400; }
.stat-lbl { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }

/* TABLE */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; max-width: 100%; display: block; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }

thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
th { padding: 10px 8px; text-align: left; font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }

td { padding: 8px; font-size: 11px; font-weight: 400; font-variant-numeric: tabular-nums; }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 7px;
  border-radius: 1px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}
.cond-Sunny    { background: rgba(255,193,0,0.22);   color: var(--yellow); }
.cond-Partly   { background: rgba(153,163,168,0.16); color: var(--overcast); }
.cond-Overcast { background: rgba(153,163,168,0.16); color: var(--overcast); }
.cond-Showers  { background: rgba(89,119,255,0.20);  color: var(--showers); }
.cond-Rainy    { background: rgba(89,119,255,0.28);  color: var(--showers); }

.bar-cell { display: flex; align-items: center; gap: 5px; }
.mini-bar { height: 6px; border-radius: 2px; opacity: 0.85; min-width: 2px; max-width: 40px; flex-shrink: 0; }
.cloud-bar { background: rgba(255,255,255,0.5); }

/* FOOTER */
footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.footer-left { display: flex; align-items: center; gap: 10px; }
.footer-logo { height: 12px; width: auto; opacity: 0.3; }
.footer-txt { font-size: 9px; font-weight: 400; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; }
.footer-right { font-size: 9px; font-weight: 400; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; text-align: right; line-height: 1.6; }

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .wrap { padding: 32px 20px 64px; }
  .date-row { grid-template-columns: 1fr; }
  .results-header { flex-direction: column; }
  .card { padding: 24px 20px; }
  header { flex-direction: column; }
  .header-right { align-items: flex-start; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<script>
const LOCATIONS = {
  wpb: { name: 'West Palm Beach', abbr: 'WPB', lat: 26.7153, lon: -80.0534 },
  jup: { name: 'Jupiter',         abbr: 'JUP', lat: 26.9342, lon: -80.0942 }
};

let activeLocations = new Set(['wpb', 'jup']);
let reportData = [];
let reportMeta = {};

// Default dates
const today = new Date();
const oneMonthAgo = new Date(today);
oneMonthAgo.setMonth(today.getMonth() - 1);
document.getElementById('startDate').value = oneMonthAgo.toISOString().slice(0, 10);
document.getElementById('endDate').value = today.toISOString().slice(0, 10);

function toggleLocation(el) {
  const loc = el.dataset.loc;
  if (activeLocations.has(loc)) {
    if (activeLocations.size === 1) return;
    activeLocations.delete(loc);
    el.classList.remove('active');
  } else {
    activeLocations.add(loc);
    el.classList.add('active');
  }
}

function setProgress(pct, text) {
  document.getElementById('progressBar').classList.add('visible');
  document.getElementById('progressText').classList.add('visible');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}

function classify(precip, cloud) {
  if (precip >= 5)  return 'Rainy';
  if (precip >= 1)  return 'Showers';
  if (cloud  >= 70) return 'Overcast';
  if (cloud  >= 40) return 'Partly Cloudy';
  return 'Sunny';
}

function calcScore(precip, cloud) {
  // 10 = perfect sunny day, 1 = worst rainy day
  // Precip: 0.8 pts per mm, capped at 8 pts — steep early penalty for any rain
  // Cloud: 0.05 pts per %, no cap — 100% overcast = full -5 pts
  const precipPenalty = Math.min(precip * 0.8, 8);
  const cloudPenalty  = cloud * 0.05;
  const raw = 10 - precipPenalty - cloudPenalty;
  return Math.max(1, Math.round(raw * 10) / 10);
}

function condClass(c) {
  if (c === 'Rainy')         return 'cond-Rainy';
  if (c === 'Showers')       return 'cond-Showers';
  if (c === 'Overcast')      return 'cond-Overcast';
  if (c === 'Partly Cloudy') return 'cond-Partly';
  return 'cond-Sunny';
}

function condIcon(c) {
  if (c === 'Rainy')         return '🌧';
  if (c === 'Showers')       return '🌦';
  if (c === 'Overcast')      return '☁️';
  if (c === 'Partly Cloudy') return '⛅';
  return '☀️';
}

async function fetchLocation(locKey, start, end) {
  const loc = LOCATIONS[locKey];
  const url = `https://historical-forecast-api.open-meteo.com/v1/forecast`
    + `?latitude=${loc.lat}&longitude=${loc.lon}`
    + `&start_date=${start}&end_date=${end}`
    + `&hourly=precipitation,cloud_cover`
    + `&timezone=America%2FNew_York`;

  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error for ${loc.name}: ${res.status}`);
  const json = await res.json();
  return aggregateDaytime(json.hourly, loc.name);
}

function aggregateDaytime(hourly, name) {
  const days = {};
  hourly.time.forEach((t, i) => {
    const hour = parseInt(t.slice(11, 13));
    if (hour < 7 || hour >= 19) return;
    const day = t.slice(0, 10);
    if (!days[day]) days[day] = { precip: [], cloud: [] };
    days[day].precip.push(hourly.precipitation[i] || 0);
    days[day].cloud.push(hourly.cloud_cover[i] || 0);
  });

  const result = {};
  Object.entries(days).forEach(([day, v]) => {
    const totalPrecip = v.precip.reduce((a, b) => a + b, 0);
    const avgCloud = v.cloud.reduce((a, b) => a + b, 0) / v.cloud.length;
    result[day] = {
      total_precip_mm: Math.round(totalPrecip * 100) / 100,
      avg_cloud_pct:   Math.round(avgCloud * 10) / 10,
    };
  });
  return result;
}

async function runReport() {
  hideError();
  const start = document.getElementById('startDate').value;
  const end   = document.getElementById('endDate').value;

  if (!start || !end) { showError('Please select both a start and end date.'); return; }
  if (end < start)    { showError('End date must be after start date.'); return; }

  const locKeys = [...activeLocations];
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="animation:spin 1s linear infinite"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="18" stroke-dashoffset="5"/></svg> Fetching data…`;

  document.getElementById('resultsSection').classList.remove('visible');

  try {
    const results = {};
    for (let i = 0; i < locKeys.length; i++) {
      const k = locKeys[i];
      setProgress(((i + 0.5) / locKeys.length) * 90, `Fetching ${LOCATIONS[k].name}…`);
      results[k] = await fetchLocation(k, start, end);
    }

    setProgress(95, 'Building report…');

    const allDates = [...new Set(locKeys.flatMap(k => Object.keys(results[k])))].sort();

    reportData = allDates.map(day => {
      const row = { date: day };
      locKeys.forEach(k => {
        const d = results[k][day] || { total_precip_mm: 0, avg_cloud_pct: 0 };
        row[`${k}_precip_mm`] = d.total_precip_mm;
        row[`${k}_cloud_pct`] = d.avg_cloud_pct;
        row[`${k}_condition`] = classify(d.total_precip_mm, d.avg_cloud_pct);
      });
      if (locKeys.length > 1) {
        const avgP = locKeys.reduce((s, k) => s + (results[k][day]?.total_precip_mm || 0), 0) / locKeys.length;
        const avgC = locKeys.reduce((s, k) => s + (results[k][day]?.avg_cloud_pct || 0), 0) / locKeys.length;
        row.combined_precip_mm = Math.round(avgP * 100) / 100;
        row.combined_cloud_pct = Math.round(avgC * 10) / 10;
        row.combined_condition = classify(avgP, avgC);
        row.combined_score = calcScore(avgP, avgC);
      }
      return row;
    });

    reportMeta = { start, end, locations: locKeys.map(k => LOCATIONS[k].name) };

    setProgress(100, 'Done.');
    setTimeout(() => {
      document.getElementById('progressBar').classList.remove('visible');
      document.getElementById('progressText').classList.remove('visible');
      renderResults(locKeys);
    }, 400);

  } catch (err) {
    showError('Error: ' + err.message);
    document.getElementById('progressBar').classList.remove('visible');
    document.getElementById('progressText').classList.remove('visible');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polygon points="3,1 13,7 3,13" fill="currentColor"/></svg> Generate Weather Report`;
  }
}

function renderResults(locKeys) {
  const section = document.getElementById('resultsSection');
  section.classList.add('visible');

  const locationStr = reportMeta.locations.join(' + ');
  document.getElementById('resultsTitle').innerHTML =
    `<span>${locationStr}</span> — Weather Report`;
  document.getElementById('resultsMeta').textContent =
    `${reportMeta.start} → ${reportMeta.end} · ${reportData.length} days · Daytime (7am–7pm)`;

  const primaryKey = locKeys[0];
  const getVal = (row, field) => row.combined_condition !== undefined
    ? row[`combined_${field}`]
    : row[`${primaryKey}_${field}`];

  const sunny      = reportData.filter(r => getVal(r, 'condition') === 'Sunny').length;
  const rainy      = reportData.filter(r => ['Rainy','Showers'].includes(getVal(r, 'condition'))).length;
  const avgCloud   = Math.round(reportData.reduce((s, r) => s + getVal(r, 'cloud_pct'), 0) / reportData.length);
  const totalPrec  = reportData.reduce((s, r) => s + getVal(r, 'precip_mm'), 0);
  const avgScore   = reportData.length && reportData[0].combined_score !== undefined
    ? Math.round(reportData.reduce((s, r) => s + (r.combined_score || 0), 0) / reportData.length * 10) / 10
    : null;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card" style="background:var(--surface);padding:24px 20px;">
      <div class="stat-num" style="color:var(--yellow)">${sunny}</div>
      <div class="stat-lbl">Sunny Days</div>
    </div>
    <div class="stat-card" style="background:var(--surface);padding:24px 20px;">
      <div class="stat-num" style="color:var(--showers)">${rainy}</div>
      <div class="stat-lbl">Rainy / Showers</div>
    </div>
    <div class="stat-card" style="background:var(--surface);padding:24px 20px;">
      <div class="stat-num" style="color:var(--overcast)">${avgCloud}%</div>
      <div class="stat-lbl">Avg Cloud Cover</div>
    </div>
    <div class="stat-card" style="background:var(--surface);padding:24px 20px;">
      <div class="stat-num" style="color:var(--showers)">${Math.round(totalPrec)}<span style="font-size:20px;font-weight:400">mm</span></div>
      <div class="stat-lbl">Total Precip</div>
    </div>
    ${avgScore !== null ? `<div class="stat-card" style="background:var(--surface);padding:24px 20px;">
      <div class="stat-num" style="color:${avgScore >= 7 ? 'var(--yellow)' : avgScore >= 4 ? 'var(--overcast)' : 'var(--showers)'}">${avgScore}</div>
      <div class="stat-lbl">Avg Score</div>
    </div>` : ''}
  `;

  // Table head
  let headHtml = '<tr><th>Date</th>';
  locKeys.forEach(k => {
    const n = LOCATIONS[k].abbr;
    headHtml += `<th>${n} Precip</th><th>${n} Cloud</th><th>${n} Condition</th>`;
  });
  if (locKeys.length > 1) headHtml += '<th>Combined</th><th>Score</th>';
  headHtml += '</tr>';
  document.getElementById('tableHead').innerHTML = headHtml;

  // Table body
  let bodyHtml = '';
  reportData.forEach(row => {
    bodyHtml += `<tr><td style="color:var(--text-muted);font-weight:600;letter-spacing:0.05em">${row.date}</td>`;
    locKeys.forEach(k => {
      const precip = row[`${k}_precip_mm`];
      const cloud  = row[`${k}_cloud_pct`];
      const cond   = row[`${k}_condition`];
      bodyHtml += `
        <td><div class="bar-cell">
          <div class="mini-bar" style="width:${Math.min(precip*6,40)}px;background:#5977ff"></div>
          ${precip}mm
        </div></td>
        <td><div class="bar-cell">
          <div class="mini-bar cloud-bar" style="width:${Math.min(cloud*0.4,40)}px"></div>
          ${cloud}%
        </div></td>
        <td><span class="badge ${condClass(cond)}">${condIcon(cond)} ${cond}</span></td>
      `;
    });
    if (locKeys.length > 1) {
      const cc = row.combined_condition;
      const sc = row.combined_score;
      // Color: >=7 yellow, 4-7 gray, <4 blue — matching the condition color system
      const scoreColor = sc >= 7 ? 'var(--yellow)' : sc >= 4 ? 'var(--overcast)' : 'var(--showers)';
      bodyHtml += `<td><span class="badge ${condClass(cc)}">${condIcon(cc)} ${cc}</span></td>`;
      bodyHtml += `<td style="font-weight:700;font-size:13px;color:${scoreColor}">${sc}</td>`;
    }
    bodyHtml += '</tr>';
  });
  document.getElementById('tableBody').innerHTML = bodyHtml;
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function downloadCSV() {
  if (!reportData.length) return;
  const keys = Object.keys(reportData[0]);
  const lines = [keys.join(',')];
  reportData.forEach(row => lines.push(keys.map(k => row[k] ?? '').join(',')));
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pathos_weather_${reportMeta.start}_${reportMeta.end}.csv`;
  a.click();
}
</script>
