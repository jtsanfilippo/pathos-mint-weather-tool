<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mint Eco — Weather Data Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint: #00c49a;
    --mint-light: #00e5b4;
    --mint-dark: #008f70;
    --bg: #060e0c;
    --surface: #0d1a16;
    --surface2: #142420;
    --border: #1e3530;
    --text: #e8f5f2;
    --text-muted: #6b9e94;
    --sunny: #f5c842;
    --partly: #7ec8e3;
    --overcast: #9aa8b2;
    --showers: #6b9de8;
    --rainy: #4a6eb5;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,196,154,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,196,154,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 56px;
  }

  .logo-block { display: flex; flex-direction: column; gap: 4px; }

  .logo-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--mint);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--mint); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 12px var(--mint);
    margin-top: 8px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Form card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--mint), transparent);
    opacity: 0.6;
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--mint);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .locations-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .location-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .location-chip.active {
    border-color: var(--mint);
    color: var(--mint);
    background: rgba(0,196,154,0.08);
  }

  .location-chip .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .date-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .field { display: flex; flex-direction: column; gap: 8px; }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  input[type="date"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    color-scheme: dark;
  }

  input[type="date"]:focus {
    border-color: var(--mint);
    box-shadow: 0 0 0 3px rgba(0,196,154,0.1);
  }

  .run-btn {
    width: 100%;
    padding: 16px;
    background: var(--mint);
    color: #060e0c;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .run-btn:hover { background: var(--mint-light); transform: translateY(-1px); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Progress */
  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
    display: none;
  }

  .progress-bar.visible { display: block; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mint-dark), var(--mint-light));
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    display: none;
  }

  .progress-text.visible { display: block; }

  /* Error */
  .error-box {
    background: rgba(229, 62, 62, 0.1);
    border: 1px solid rgba(229, 62, 62, 0.3);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: #fc8181;
    margin-top: 16px;
    display: none;
  }

  .error-box.visible { display: block; }

  /* Results */
  .results-section { display: none; }
  .results-section.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: gap;
    gap: 12px;
  }

  .results-title {
    font-size: 18px;
    font-weight: 700;
  }

  .results-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .download-btn {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--mint);
    color: var(--mint);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .download-btn:hover {
    background: rgba(0,196,154,0.1);
  }

  /* Summary stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 12px 12px;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    white-space: nowrap;
  }

  .condition-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
  }

  .cond-Sunny       { background: rgba(245,200,66,0.15); color: var(--sunny); }
  .cond-Partly      { background: rgba(126,200,227,0.15); color: var(--partly); }
  .cond-Overcast    { background: rgba(154,168,178,0.15); color: var(--overcast); }
  .cond-Showers     { background: rgba(107,157,232,0.15); color: var(--showers); }
  .cond-Rainy       { background: rgba(74,110,181,0.15); color: var(--rainy); }

  .bar-cell { display: flex; align-items: center; gap: 8px; }

  .mini-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--mint);
    opacity: 0.7;
    min-width: 2px;
    max-width: 40px;
  }

  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  @media (max-width: 600px) {
    .date-row { grid-template-columns: 1fr; }
    .results-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-block">
      <div class="logo-tag">Mint Eco Car Wash</div>
      <h1>Weather<br><span>Data Tool</span></h1>
    </div>
    <div class="status-dot"></div>
  </header>

  <!-- Form Card -->
  <div class="card">
    <div class="card-label">01 — Select Locations</div>
    <div class="locations-row" id="locationChips">
      <div class="location-chip active" data-loc="wpb" onclick="toggleLocation(this)">
        <div class="dot"></div> West Palm Beach
      </div>
      <div class="location-chip active" data-loc="jup" onclick="toggleLocation(this)">
        <div class="dot"></div> Jupiter
      </div>
    </div>

    <div class="card-label">02 — Date Range</div>
    <div class="date-row">
      <div class="field">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate">
      </div>
      <div class="field">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate">
      </div>
    </div>

    <button class="run-btn" id="runBtn" onclick="runReport()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 2l10 6-10 6V2z" fill="currentColor"/>
      </svg>
      Generate Weather Report
    </button>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">

    <div class="results-header">
      <div>
        <div class="results-title" id="resultsTitle">Weather Report</div>
        <div class="results-meta" id="resultsMeta"></div>
      </div>
      <button class="download-btn" onclick="downloadCSV()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Export CSV
      </button>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <span>Source: Open-Meteo Historical Forecast API · ERA5 Reanalysis</span>
    <span>Daytime hours: 7am – 7pm EST</span>
  </footer>

</div>

<script>
const LOCATIONS = {
  wpb: { name: 'West Palm Beach', abbr: 'WPB', lat: 26.7153, lon: -80.0534 },
  jup: { name: 'Jupiter',         abbr: 'JUP', lat: 26.9342, lon: -80.0942 }
};

let activeLocations = new Set(['wpb', 'jup']);
let reportData = [];
let reportMeta = {};

// Set default dates
const today = new Date();
const oneMonthAgo = new Date(today);
oneMonthAgo.setMonth(today.getMonth() - 1);
document.getElementById('startDate').value = oneMonthAgo.toISOString().slice(0, 10);
document.getElementById('endDate').value = today.toISOString().slice(0, 10);

function toggleLocation(el) {
  const loc = el.dataset.loc;
  if (activeLocations.has(loc)) {
    if (activeLocations.size === 1) return; // keep at least one
    activeLocations.delete(loc);
    el.classList.remove('active');
  } else {
    activeLocations.add(loc);
    el.classList.add('active');
  }
}

function setProgress(pct, text) {
  document.getElementById('progressBar').classList.add('visible');
  document.getElementById('progressText').classList.add('visible');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}

function classify(precip, cloud) {
  if (precip >= 5)  return 'Rainy';
  if (precip >= 1)  return 'Showers';
  if (cloud  >= 70) return 'Overcast';
  if (cloud  >= 40) return 'Partly Cloudy';
  return 'Sunny';
}

function condClass(c) {
  if (c === 'Rainy')        return 'cond-Rainy';
  if (c === 'Showers')      return 'cond-Showers';
  if (c === 'Overcast')     return 'cond-Overcast';
  if (c === 'Partly Cloudy') return 'cond-Partly';
  return 'cond-Sunny';
}

function condEmoji(c) {
  if (c === 'Rainy')        return '🌧';
  if (c === 'Showers')      return '🌦';
  if (c === 'Overcast')     return '☁️';
  if (c === 'Partly Cloudy') return '⛅';
  return '☀️';
}

async function fetchLocation(locKey, start, end) {
  const loc = LOCATIONS[locKey];
  const url = `https://historical-forecast-api.open-meteo.com/v1/forecast`
    + `?latitude=${loc.lat}&longitude=${loc.lon}`
    + `&start_date=${start}&end_date=${end}`
    + `&hourly=precipitation,cloud_cover`
    + `&timezone=America%2FNew_York`;

  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error for ${loc.name}: ${res.status}`);
  const json = await res.json();
  return aggregateDaytime(json.hourly, loc.name);
}

function aggregateDaytime(hourly, name) {
  const days = {};
  hourly.time.forEach((t, i) => {
    const hour = parseInt(t.slice(11, 13));
    if (hour < 7 || hour >= 19) return;
    const day = t.slice(0, 10);
    if (!days[day]) days[day] = { precip: [], cloud: [] };
    days[day].precip.push(hourly.precipitation[i] || 0);
    days[day].cloud.push(hourly.cloud_cover[i] || 0);
  });

  const result = {};
  Object.entries(days).forEach(([day, v]) => {
    const totalPrecip = v.precip.reduce((a, b) => a + b, 0);
    const avgCloud = v.cloud.reduce((a, b) => a + b, 0) / v.cloud.length;
    result[day] = {
      total_precip_mm: Math.round(totalPrecip * 100) / 100,
      avg_cloud_pct:   Math.round(avgCloud * 10) / 10,
    };
  });
  return result;
}

async function runReport() {
  hideError();
  const start = document.getElementById('startDate').value;
  const end   = document.getElementById('endDate').value;

  if (!start || !end) { showError('Please select both a start and end date.'); return; }
  if (end < start)    { showError('End date must be after start date.'); return; }

  const locKeys = [...activeLocations];
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="animation:spin 1s linear infinite"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" stroke-dasharray="20" stroke-dashoffset="5"/></svg> Fetching data…`;

  document.getElementById('resultsSection').classList.remove('visible');

  try {
    const results = {};
    for (let i = 0; i < locKeys.length; i++) {
      const k = locKeys[i];
      setProgress(((i + 0.5) / locKeys.length) * 90, `Fetching ${LOCATIONS[k].name}…`);
      results[k] = await fetchLocation(k, start, end);
    }

    setProgress(95, 'Building report…');

    // Merge by date
    const allDates = [...new Set(locKeys.flatMap(k => Object.keys(results[k])))].sort();

    reportData = allDates.map(day => {
      const row = { date: day };
      locKeys.forEach(k => {
        const d = results[k][day] || { total_precip_mm: 0, avg_cloud_pct: 0 };
        row[`${k}_precip_mm`]   = d.total_precip_mm;
        row[`${k}_cloud_pct`]   = d.avg_cloud_pct;
        row[`${k}_condition`]   = classify(d.total_precip_mm, d.avg_cloud_pct);
      });
      if (locKeys.length > 1) {
        const avgP = locKeys.reduce((s, k) => s + (results[k][day]?.total_precip_mm || 0), 0) / locKeys.length;
        const avgC = locKeys.reduce((s, k) => s + (results[k][day]?.avg_cloud_pct || 0), 0) / locKeys.length;
        row.combined_precip_mm  = Math.round(avgP * 100) / 100;
        row.combined_cloud_pct  = Math.round(avgC * 10) / 10;
        row.combined_condition  = classify(avgP, avgC);
      }
      return row;
    });

    reportMeta = { start, end, locations: locKeys.map(k => LOCATIONS[k].name) };

    setProgress(100, 'Done!');
    setTimeout(() => {
      document.getElementById('progressBar').classList.remove('visible');
      document.getElementById('progressText').classList.remove('visible');
      renderResults(locKeys);
    }, 400);

  } catch (err) {
    showError('Error: ' + err.message);
    document.getElementById('progressBar').classList.remove('visible');
    document.getElementById('progressText').classList.remove('visible');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2l10 6-10 6V2z" fill="currentColor"/></svg> Generate Weather Report`;
  }
}

function renderResults(locKeys) {
  const section = document.getElementById('resultsSection');
  section.classList.add('visible');

  // Title & meta
  document.getElementById('resultsTitle').textContent =
    reportMeta.locations.join(' + ') + ' — Weather Report';
  document.getElementById('resultsMeta').textContent =
    `${reportMeta.start} → ${reportMeta.end} · ${reportData.length} days · Daytime (7am–7pm)`;

  // Stats
  const sunny   = reportData.filter(r => (r.combined_condition || r[`${locKeys[0]}_condition`]) === 'Sunny').length;
  const rainy   = reportData.filter(r => ['Rainy','Showers'].includes(r.combined_condition || r[`${locKeys[0]}_condition`])).length;
  const avgCloud = Math.round(reportData.reduce((s, r) => s + (r.combined_cloud_pct ?? r[`${locKeys[0]}_cloud_pct`]), 0) / reportData.length);
  const totalPrecip = reportData.reduce((s, r) => s + (r.combined_precip_mm ?? r[`${locKeys[0]}_precip_mm`]), 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-num" style="color:var(--sunny)">${sunny}</div>
      <div class="stat-label">Sunny Days</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--rainy)">${rainy}</div>
      <div class="stat-label">Rainy / Showers</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--partly)">${avgCloud}%</div>
      <div class="stat-label">Avg Cloud Cover</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--showers)">${Math.round(totalPrecip)}mm</div>
      <div class="stat-label">Total Precip</div>
    </div>
  `;

  // Table head
  let headHtml = '<tr><th>Date</th>';
  locKeys.forEach(k => {
    const n = LOCATIONS[k].abbr;
    headHtml += `<th>${n} Precip</th><th>${n} Cloud</th><th>${n} Condition</th>`;
  });
  if (locKeys.length > 1) headHtml += '<th>Combined</th>';
  headHtml += '</tr>';
  document.getElementById('tableHead').innerHTML = headHtml;

  // Table body
  let bodyHtml = '';
  reportData.forEach(row => {
    bodyHtml += `<tr><td>${row.date}</td>`;
    locKeys.forEach(k => {
      const precip = row[`${k}_precip_mm`];
      const cloud  = row[`${k}_cloud_pct`];
      const cond   = row[`${k}_condition`];
      bodyHtml += `
        <td><div class="bar-cell">
          <div class="mini-bar" style="width:${Math.min(precip*6,40)}px;background:var(--showers)"></div>
          ${precip}mm
        </div></td>
        <td><div class="bar-cell">
          <div class="mini-bar" style="width:${Math.min(cloud*0.4,40)}px;background:var(--text-muted)"></div>
          ${cloud}%
        </div></td>
        <td><span class="condition-badge ${condClass(cond)}">${condEmoji(cond)} ${cond}</span></td>
      `;
    });
    if (locKeys.length > 1) {
      const cc = row.combined_condition;
      bodyHtml += `<td><span class="condition-badge ${condClass(cc)}">${condEmoji(cc)} ${cc}</span></td>`;
    }
    bodyHtml += '</tr>';
  });
  document.getElementById('tableBody').innerHTML = bodyHtml;

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function downloadCSV() {
  if (!reportData.length) return;
  const keys = Object.keys(reportData[0]);
  const lines = [keys.join(',')];
  reportData.forEach(row => {
    lines.push(keys.map(k => row[k] ?? '').join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mint_weather_${reportMeta.start}_${reportMeta.end}.csv`;
  a.click();
}

// Spinner keyframe
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);
</script>
</body>
